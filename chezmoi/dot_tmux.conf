# Clean, readable tmux defaults with a compact Catppuccin Mocha theme.

# Terminal and shell behavior
set -g default-terminal "tmux-256color"
set -g default-shell "/home/linuxbrew/.linuxbrew/bin/zsh"
# Keep terminal capability overrides idempotent across repeated reloads.
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:extkeys:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-256color:RGB"
set -g terminal-overrides "linux*:AX@,xterm*:Tc"
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on
set -g escape-time 10
# Keep cursor steady even when tmux redraws status/hooks.
set -g cursor-style block
set -g history-limit 50000
set -g set-clipboard on

# Ergonomics
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
setw -g allow-rename on
setw -g mode-keys vi

# Splits and windows open in the selected pane directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key q kill-session
# Rescue a wedged pane TTY without typing into the foreground app.
bind-key r run-shell 'tty="#{pane_tty}"; stty sane < "$tty"; printf "\033c" > "$tty"' \; display-message "Reset active pane TTY"
bind-key R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Vim-style pane movement and resizing. Prefix h/j/k/l stay tmux-local;
# global Ctrl+Arrow/Ctrl+h/j/k/l movement is made Vim-aware below by
# christoomey/vim-tmux-navigator so Vim splits and tmux panes feel seamless.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n S-Left previous-window
bind-key -n S-Right next-window
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5
# Equalize column widths with Prefix = without changing pane topology.
bind-key = run-shell "~/.tmux/equalize-column-widths.py '#{window_id}'"


# Mouse drag should not enter copy/select mode from a live pane.
# Drag selection still works after scrollback/copy-mode is already active.
bind-key -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "select-pane -t ="

# Vi copy mode selections.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# Smart pane switching with awareness of Vim/Neovim splits. The tmux plugin
# forwards Ctrl+Arrow into Vim when the active pane is Vim; otherwise it moves
# between tmux panes. Do not bind Ctrl+h/j/k/l for pane navigation.
set -g @vim_navigator_mapping_left "C-Left"
set -g @vim_navigator_mapping_down "C-Down"
set -g @vim_navigator_mapping_up "C-Up"
set -g @vim_navigator_mapping_right "C-Right"

# Clear any previous Ctrl+h/j/k/l navigator bindings from already-running tmux sessions.
unbind-key -q -n C-h
unbind-key -q -n C-j
unbind-key -q -n C-k
unbind-key -q -n C-l
unbind-key -q -T copy-mode-vi C-h
unbind-key -q -T copy-mode-vi C-j
unbind-key -q -T copy-mode-vi C-k
unbind-key -q -T copy-mode-vi C-l

set -g @continuum-restore 'on'
# Keep automatic tmux layout saves lightweight. Capturing full pane history from
# many Codex/Playwright panes can block tmux long enough to cause input lag.
# Disable automatic tmux-continuum saves; use tmux-resurrect manual saves when
# needed. Even lightweight autosaves can hitch input under many active panes.
set -g @continuum-save-interval '0'
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @yank_action 'copy-pipe-no-clear'

# Status bar
set -g status on
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-interval 60
set -g status-left-length 60
set -g status-right-length 120
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bg=#313244]#[fg=#11111b,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#313244]"
set -g status-right "#[fg=#cba6f7,bg=#313244]#[fg=#11111b,bg=#cba6f7,bold]  %-m/%-d/%Y #[fg=#89b4fa,bg=#cba6f7]#[fg=#11111b,bg=#89b4fa,bold]  %I:%M %p #[fg=#89b4fa,bg=#313244]"

# Window tabs
set -g window-status-separator ""
setw -g window-status-style "bg=#313244,fg=#a6adc8"
setw -g window-status-format "#{?#{==:#{window_index},1},#[fg=#45475a]#[bg=#313244],}#[fg=#cdd6f4]#[bg=#45475a] #I #[fg=#a6adc8]#W #{?#{==:#{window_index},#{session_windows}},#[fg=#45475a]#[bg=#313244],}"
setw -g window-status-current-style "bg=#a6e3a1,fg=#11111b,bold"
setw -g window-status-current-format "#{?#{==:#{window_index},1},#[fg=#a6e3a1]#[bg=#313244],}#[fg=#11111b]#[bg=#a6e3a1,bold] #I #[fg=#11111b]#W #{?#{==:#{window_index},#{session_windows}},#[fg=#a6e3a1]#[bg=#313244],}"

# Panes, prompts, and menus
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#11111b,bg=#89b4fa,bold] #{?#{@static_name},#{@static_name},#{pane_title}} #[fg=#89b4fa,bg=#1e1e2e]"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set-hook -g -p pane-mode-changed 'run-shell "if [ #{pane_in_mode} -gt 0 ]; then tmux set-option -p -t #{pane_id} window-style bg=#242438; tmux set-option -p -t #{pane_id} window-active-style bg=#242438; else tmux set-option -p -u -t #{pane_id} window-style; tmux set-option -p -u -t #{pane_id} window-active-style; fi"'
set -g display-panes-colour "#89b4fa"
set -g display-panes-active-colour "#f38ba8"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#f9e2af"
set -g mode-style "bg=#89b4fa,fg=#11111b,bold"
set -g clock-mode-colour "#89b4fa"

# Disable bell/activity styling; do not turn panes or windows red.
setw -g monitor-activity off
set -g visual-activity off
setw -g monitor-bell off
set -g visual-bell off
set -g bell-action none
setw -g window-status-bell-style "default"
set-hook -gu alert-bell
set-hook -gu after-select-pane
set-hook -gu after-select-window

# Keep TPM at the bottom so plugin bindings load after local bindings.
run '~/.tmux/plugins/tpm/tpm'
